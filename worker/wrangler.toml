name = "naresh-gemini-proxy"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Origins allowed to call this worker from a browser (comma-separated, no spaces
# needed). These are your live portfolio domains. localhost is always allowed for
# local dev — see src/index.js isAllowedOrigin(). Update this if you move to a
# custom domain.
[vars]
ALLOWED_ORIGINS = "https://naresh-portfolio-sde.web.app,https://naresh-portfolio-sde.firebaseapp.com"

# Per-IP rate limit. `name` is the binding accessed as env.RATE_LIMITER in code.
# `period` must be 10 or 60 (seconds). Current cap: 15 requests / 60s per IP.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 15
  period = 60

# NOTE: GEMINI_API_KEY is NOT set here. It is a secret — set it with:
#   npx wrangler secret put GEMINI_API_KEY
# Do not put the key in this file (this file is committed to git).
